<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema - Cooperativa</title>
  <!-- Reutilizamos tus estilos base y añadimos el específico de login -->
  <link rel="stylesheet" href="./socios.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body class="login-body">

  <div class="login-container">
    <header class="login-header">
      <h1>COOPBARAHONA</h1>
      <p>Gestión y Control Administrativo</p>
    </header>

    <main>
      <section class="card login-card">
        <div class="login-icon">🔐</div>
        <h2>Iniciar Sesión</h2>
        <p class="login-subtitle">Introduce tus credenciales para acceder</p>

        <form id="form-login" onsubmit="ejecutarLogin(event)">
          <div class="campo">
            <label for="usuario">Usuario / Email</label>
            <input type="text" id="usuario" placeholder="ej: Grupo2" required>
          </div>

          <div class="campo">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="••••••••" required>
          </div>

          <div class="login-opciones">
            <label class="checkbox-label">
              <input type="checkbox" id="recordar"> Recordarme
            </label>
            <a href="#" class="link-recuperar" onclick="abrirModalRecuperar(event)">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="btn-entrar">
            Entrar al Sistema
          </button>
        </form>

        <!-- Mensajes de error/éxito -->
        <div id="mensaje" class="mensaje" style="display:none;"></div>
      </section>
    </main>

    <footer class="login-footer">
      <p>&copy; 2026 Cooperativa de Ahorros y Créditos - COOPBARAHONA.</p>
    </footer>
  </div>

  <!-- MODAL RECUPERAR CONTRASEÑA -->
  <div id="modal-recuperar" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>🔑 Recuperar Contraseña</h3>
      <p>Introduce tu correo electrónico para recibir las instrucciones de recuperación.</p>
      
      <div class="campo" style="margin-top:15px;">
        <label for="email-recuperar">Correo Electrónico</label>
        <input type="email" id="email-recuperar" placeholder="correo@ejemplo.com">
      </div>

      <div class="modal-acciones" style="margin-top:20px;">
        <button class="btn btn-primary" onclick="enviarRecuperacion()">Enviar Instrucciones</button>
        <button class="btn btn-secondary" onclick="cerrarModalRecuperar()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="./login.js"></script>
</body>
</html>
